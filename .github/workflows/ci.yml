name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-format-test:
    name: lint-format-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run checkstyle
        run: mvn -B checkstyle:check

      - name: Run spotless check
        run: mvn -B spotless:check

      - name: Run tests
        run: mvn -B test
